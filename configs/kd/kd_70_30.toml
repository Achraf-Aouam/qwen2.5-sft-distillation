# alpha=0.7, T=1.0 — teacher-heavy ablation (70% soft / 30% hard).

[paths]
train_data = "data/data_04_12.json"
output_dir = "outputs_kd/kd_70_30"
local_log_dir = ""
resume_from_checkpoint = "auto"

[kd]
dataset_dir = "KL_div_prep/artifacts/qwen2.5-14b-top10-kd"
alpha = 0.7
temperature = 1.0

[model]
model_name = "unsloth/Qwen2.5-0.5B-Instruct"
max_seq_length = 6048
load_in_4bit = false

[lora]
rank = 128
lora_alpha = 128
lora_dropout = 0.0
bias = "none"
use_gradient_checkpointing = "unsloth"
use_rslora = false
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

[training]
per_device_train_batch_size = 32
per_device_eval_batch_size = 8
gradient_accumulation_steps = 2
learning_rate = 1e-5
weight_decay = 0.01
warmup_steps = 5
num_train_epochs = 2.0
max_steps = -1
logging_steps = 2
save_steps = 25
eval_steps = 25
save_total_limit = -1
dataset_num_proc = 1
packing = false
seed = 3407
optim = "adamw_8bit"
lr_scheduler_type = "linear"

[eval]
gen_batch_size = 8
max_new_tokens = 512

[eval.corpora]
order = "eval/eval_order.json"
vehicle = "eval/eval_vehicle.json"
invoice = "eval/eval_invoice.json"

[wandb]
project = "hero_qwen3_kd"
run_name = "kd_70_30"

[runtime]
allow_tf32 = true
